<svg width="200" height="200"
    xmlns="http://www.w3.org/2000/svg">
    <!-- Define a rectangle with stroke and no fill -->
    <rect id="background" x="10" y="10" width="180" height="180" stroke="blue" stroke-width="5" fill="none" />

    <!-- Define the animation to expand the stroke into a fill -->
    <animate xlink:href="#background" attributeName="fill" from="none" to="blue" begin="2s" dur="1s" fill="freeze" />

    <animate xlink:href="#background" attributeName="stroke-width" from="5" to="0" begin="2s" dur="1s" fill="freeze" />
</svg>